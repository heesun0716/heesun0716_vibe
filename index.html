HTML
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정밀 성격유형 진단 테스트 (Premium MBTI)</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-app: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
        }

        /* 공통 버튼 */
        .btn-main {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
        }
        .btn-main:hover {
            background-color: #3730a3;
            transform: translateY(-1px);
        }

        /* 프로그레스 바 */
        .progress-wrapper {
            display: none;
            margin-bottom: 30px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .progress-bg {
            width: 100%;
            background-color: #e2e8f0;
            height: 8px;
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #818cf8);
            transition: width 0.3s ease;
        }

        /* 페이지 컨트롤 */
        .page { display: none; }
        .active { display: block; }

        /* 질문지 디자인 */
        .question-title {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 35px;
            word-break: keep-all;
        }
        .opt-btn {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            color: var(--text-main);
            padding: 20px;
            font-size: 1.05rem;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 16px;
            text-align: left;
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-weight: 500;
            line-height: 1.4;
        }
        .opt-btn:hover {
            border-color: var(--primary);
            background-color: var(--primary-light);
            color: #312e81;
        }

        /* 결과 화면 디자인 */
        .result-header { text-align: center; margin-bottom: 30px; }
        .mbti-tag { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin: 10px 0; letter-spacing: 2px; }
        .character-emoji { font-size: 4.5rem; display: block; margin-bottom: 10px; }
        .result-title { font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin-bottom: 30px; }
        
        /* 인트로 디자인 추가 */
        .intro-container { text-align: center; }
        .intro-title { font-size: 2rem; font-weight: 800; margin-bottom: 10px; color: var(--text-main); }
        .intro-desc { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="start-page" class="page active">
            <div class="intro-container">
                <span class="character-emoji">🧠</span>
                <div class="intro-title">정밀 성격유형 진단</div>
                <div class="intro-desc">질문에 솔직하게 답하며<br>나의 진짜 MBTI 성향을 확인해 보세요.</div>
                <button class="btn-main" onclick="startTest()">테스트 시작하기</button>
            </div>
        </div>

        <div id="question-page" class="page">
            <div class="progress-wrapper" id="progress-area">
                <div class="progress-text">
                    <span>테스트 진행도</span>
                    <span id="progress-percent">1 / 4</span>
                </div>
                <div class="progress-bg">
                    <div class="progress-fill" id="progress-fill-bar"></div>
                </div>
            </div>

            <div class="question-title" id="question-text">질문을 불러오는 중입니다...</div>
            <div id="options-container"></div>
        </div>

        <div id="result-page" class="page">
            <div class="result-header">
                <span class="character-emoji" id="result-emoji">🔮</span>
                <p style="color: var(--text-muted); font-weight: 600; margin: 0;">당신의 성격 유형은</p>
                <div class="mbti-tag" id="result-mbti">ESTJ</div>
                <div class="result-title" id="result-title">지표 분석 중...</div>
                <button class="btn-main" onclick="location.reload()">다시 테스트하기</button>
            </div>
        </div>
    </div>

    <script>
        // 핵심 MBTI 4문항 데이터 세팅
        const questions = [
            { q: "주말에 시간이 생겼을 때 나는 주로 어떤 행동을 하나요?", a: "친구들을 만나거나 밖으로 나가 에너지를 얻는다 (E)", b: "집에서 혼자 넷플릭스를 보며 에너지를 충전한다 (I)", type: "EI" },
            { q: "사과를 보았을 때 머릿속에 먼저 드는 생각은?", a: "빨갛다, 맛있다, 아삭하다 (S)", b: "백설공주, 뉴턴의 중력, 아이폰 로고 (N)", type: "SN" },
            { q: "친구가 '나 속상해서 쇼핑했어'라고 했을 때 나의 반응은?", a: "쇼핑 뭐 했어? 세일 많이 해? (T)", b: "헐.. 무슨 일 있었어? 왜 속상했어ㅠㅠ (F)", type: "FT" },
            { q: "과제를 하거나 업무를 처리할 때 나의 계획 스타일은?", a: "미리 마감일 전까지 분량을 나눠 체계적으로 끝낸다 (J)", b: "마감 직전까지 미루다가 막판에 집중력을 발휘한다 (P)", type: "JP" }
        ];

        let currentIdx = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        function startTest() {
            document.getElementById('start-page').classList.remove('active');
            document.getElementById('question-page').classList.add('active');
            document.getElementById('progress-area').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            if (currentIdx >= questions.length) {
                showResult();
                return;
            }

            // 프로그레스 바 상태 업데이트
            document.getElementById('progress-percent').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('progress-fill-bar').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;

            const currentQ = questions[currentIdx];
            document.getElementById('question-text').innerText = currentQ.q;

            const container = document.getElementById('options-container');
            container.innerHTML = ''; // 이전 선택지 초기화

            // 첫 번째 선택지 버튼 생성
            const btnA = document.createElement('button');
            btnA.className = 'opt-btn';
            btnA.innerText = currentQ.a;
            btnA.onclick = () => selectOption(currentQ.type[0]);

            // 두 번째 선택지 버튼 생성
            const btnB = document.createElement('button');
            btnB.className = 'opt-btn';
            btnB.innerText = currentQ.b;
            btnB.onclick = () => selectOption(currentQ.type[1]);

            container.appendChild(btnA);
            container.appendChild(btnB);
        }

        function selectOption(key) {
            scores[key]++;
            currentIdx++;
            showQuestion();
        }

        function showResult() {
            document.getElementById('question-page').classList.remove('active');
            document.getElementById('progress-area').style.display = 'none';
            document.getElementById('result-page').classList.add('active');

            // 점수 판정 연산
            let mbti = '';
            mbti += (scores.E >= scores.I) ? 'E' : 'I';
            mbti += (scores.S >= scores.N) ? 'S' : 'N';
            mbti += (scores.T >= scores.F) ? 'T' : 'F';
            mbti += (scores.J >= scores.P) ? 'J' : 'P';

            // 결과 데이터 맵
            const resultTemplates = {
                'ISTJ': { title: '청렴결백한 논리주의자', emoji: '📐' },
                'ISFJ': { title: '용감한 수호자', emoji: '🛡️' },
                'INFJ': { title: '선의의 옹호자', emoji: '🔮' },
                'INTJ': { title: '용의주도한 전략가', emoji: '♟️' },
                'ISTP': { title: '만능 재주꾼', emoji: '🔧' },
                'ISFP': { title: '호기심 많은 예술가', emoji: '🎨' },
                'INFP': { title: '열정적인 중재자', emoji: '🌱' },
                'INTP': { title: '논리적인 사색가', emoji: '🧪' },
                'ESTP': { title: '모험을 즐기는 사업가', emoji: '🏎️' },
                'ESFP': { title: '자유로운 영혼의 연예인', emoji: '✨' },
                'ENFP': { title: '재기발랄한 활동가', emoji: '🎈' },
                'ENTP': { title: '뜨거운 논쟁을 즐기는 변론가', emoji: '📢' },
                'ESTJ': { title: '엄격한 관리자', emoji: '👔' },
                'ESFJ': { title: '사교적인 외교관', emoji: '🤝' },
                'ENFJ': { title: '정의로운 사회운동가', emoji: '☀️' },
                'ENTJ': { title: '대담한 통솔자', emoji: '👑' }
            };

            const finalResult = resultTemplates[mbti] || { title: '알 수 없는 신비로운 존재', emoji: '👽' };

            // 화면에 바인딩
            document.getElementById('result-mbti').innerText = mbti;
            document.getElementById('result-title').innerText = finalResult.title;
            document.getElementById('result-emoji').innerText = finalResult.emoji;
        }
    </script>
</body>
</html>
