<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정밀 성격유형 진단 테스트 (Premium MBTI)</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-app: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
        }

        /* 공통 버튼 */
        .btn-main {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
        }
        .btn-main:hover {
            background-color: #3730a3;
            transform: translateY(-1px);
        }

        /* 프로그레스 바 */
        .progress-wrapper {
            display: none;
            margin-bottom: 30px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .progress-bg {
            width: 100%;
            background-color: #e2e8f0;
            height: 8px;
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #818cf8);
            transition: width 0.3s ease;
        }

        /* 페이지 컨트롤 */
        .page { display: none; }
        .active { display: block; }

        /* 질문지 디자인 */
        .question-title {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 35px;
            word-break: keep-all;
        }
        .opt-btn {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            color: var(--text-main);
            padding: 20px;
            font-size: 1.05rem;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 16px;
            text-align: left;
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-weight: 500;
            line-height: 1.4;
        }
        .opt-btn:hover {
            border-color: var(--primary);
            background-color: var(--primary-light);
            color: #312e81;
        }

        /* 결과 화면 탭 시스템 */
        .result-header { text-align: center; margin-bottom: 30px; }
        .mbti-tag { font-size: 3rem; font-weight: 900; color: var(--primary); margin: 10px 0; letter-spacing: 2px; }
